    * {

      height: auto;
      display: block;

    }

    p {
      margin: 18px auto 0;
      max-width: 480px;
      color: var(--muted);
      font-size: 18px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      margin-top: 28px;
      padding: 0 28px;
      border-radius: 7px;
      border: 1px solid var(--orange);
      background: linear-gradient(180deg, #ff3b30, var(--orange));

      color: #fff;
      font-size: 16px;
      font-weight: 900;
      text-decoration: none;
      text-align: center;
    }

      display: inline-block;
      margin-top: 16px;
      color: var(--muted);
      font-size: 15px;

      text-decoration: none;
